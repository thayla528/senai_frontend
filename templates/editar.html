{% extends 'base.html' %}

{% block conteudo %}
<style>
    .input-neon {
        background-color: #0b0e14 !important;
        color: #00d4ff !important;
        border: 1px solid #00d4ff !important;
        box-shadow: inset 0 0 5px rgba(0, 212, 255, 0.2);
        border-radius: 10px;
    }
    .neon-text {
        color: #00d4ff;
        text-shadow: 0 0 10px #00d4ff;
    }
    .btn-round {
        border-radius: 30px !important;
    }
    /* Estilo do card igual ao seu Modal */
    .card-editar {
        background-color: #1a1d24;
        border: 2px solid #00d4ff;
        box-shadow: 0 0 30px #00d4ff;
        border-radius: 20px;
        padding: 30px;
        margin-top: 50px;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        filter: invert(65%) sepia(97%) saturate(1872%) hue-rotate(159deg) brightness(105%) contrast(105%);
    }
</style>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 card-editar">
            <h1 class="neon-text mb-4 text-center">Editar Funcionário</h1>

            <form action="{{ url_for('editar_funcionario', id=funcionario.id) }}" method="post">
                <div class="mb-3">
                    <label class="text-white small">Nome Completo:</label>
                    <input name="nome" value="{{ funcionario.nome }}" class="form-control input-neon" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="text-white small">Data Nascimento:</label>
                        <!-- O value aqui precisa estar no formato YYYY-MM-DD -->
                        <input type="date" name="data_nascimento" value="{{ funcionario.data_nascimento }}" class="form-control input-neon" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="text-white small">CPF:</label>
                        <input name="cpf" value="{{ funcionario.cpf }}" class="form-control input-neon" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="text-white small">E-mail Corporativo:</label>
                    <input type="email" name="email" value="{{ funcionario.email }}" class="form-control input-neon" required>
                </div>

                <div class="mb-3">
                    <label class="text-white small">Senha de Acesso (Deixe em branco para manter a atual):</label>
                    <input placeholder="******" type="password" name="senha" class="form-control input-neon">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="text-white small">Cargo:</label>
                        <input name="cargo" value="{{ funcionario.cargo }}" class="form-control input-neon" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="text-white small">Salário (R$):</label>
                        <input type="number" step="0.01" name="salario" value="{{ funcionario.salario }}" class="form-control input-neon" required>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-info text-white fw-bold shadow btn-round" style="box-shadow: 0 0 15px #00d4ff;">
                        Salvar Alterações
                    </button>
                    <a href="{{ url_for('funcionarios') }}" class="btn btn-outline-secondary btn-round text-white border-0 mt-2">
                        Cancelar e Voltar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
