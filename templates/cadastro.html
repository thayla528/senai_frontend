{% extends 'base.html' %}

{% block conteudo %}


<div class="modal-body">
<form action="{{ url_for('cadastro_usuario') }}" method="post">
    <div class="calculos d-flex justify-content-center align-items-center vh-100">
        <div class="card card_calculo d-flex flex-column p-4 gap-3" style="width: 350px; height: auto;">

            <h4 class="text-center">Criar Conta</h4>

            <div class="form-group">
                <label class="form-label w-100">
                    Nome:
                    <input type="text" name="nome" class="form-control" required placeholder="Seu nome completo">
                </label>
            </div>

            <div class="form-group">
                <label class="form-label w-100">
                    Email:
                    <input type="email" name="email" class="form-control" required placeholder="exemplo@email.com">
                </label>
            </div>

            <div class="form-group">
                <label class="form-label w-100">
                    Senha:
                    <input type="password" name="senha" class="form-control" required placeholder="Crie uma senha">
                </label>
            </div>

            <button type="submit" class="btn btn-success w-100">Finalizar Cadastro</button>

            <div class="text-center mt-2">
                <a href="{{ url_for('login') }}" class="text-decoration-none small text-secondary">
                    Já tem uma conta? Faça login
                </a>
            </div>
        </div>
    </div>
</form>
</div>
{% endblock %}
