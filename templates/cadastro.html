{% extends 'base.html' %}

{% block conteudo %}


<div class="modal-body">
<form action="{{ url_for('cadastro_usuario') }}" method="post">
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow-sm" style="width: 350px; height: auto; border-radius: 15px;">

            <h4 class="text-center mb-4">Criar Conta</h4>

            <div class="mb-3">
                <label class="form-label w-100">
                    Nome:
                    <input type="text" name="nome" class="form-control" required placeholder="Seu nome completo">
                </label>
            </div>

            <div class="mb-3">
                <label class="form-label w-100">
                    Email:
                    <input type="email" name="email" class="form-control" required placeholder="exemplo@email.com">
                </label>
            </div>

            <div class="mb-3">
                <label class="form-label w-100">
                    Senha:
                    <input type="password" name="senha" class="form-control" required placeholder="Crie uma senha">
                </label>
            </div>

            <button type="submit" class="btn btn-info w-100 mt-2 text-white">Cadastrar</button>

            <div class="text-center mt-3">
                <a href="{{ url_for('login') }}" class="text-decoration-none small text-secondary">
                    Já tem uma conta? Faça login
                </a>
            </div>
        </div>
    </div>
</form>
</div>
{% endblock %}
