{% extends 'base.html' %}

{% block conteudo %}
<style>
    /* Estilo para as letras que o usuário digita */
    .input-neon {
        color: #00d4ff !important;
        text-shadow: 0 0 5px #00d4ff;
    }

    /* Estilo para as letras de exemplo (Placeholder) */
    .input-neon::placeholder {
        color: rgba(0, 212, 255, 0.6);
        text-shadow: 0 0 8px #00d4ff;
    }

    /* Remove a borda branca chata do Bootstrap ao clicar */
    .form-control:focus {
        background-color: #1a1d24;
        border-color: #00d4ff;
        box-shadow: 0 0 10px #00d4ff;
        color: #00d4ff;
    }
</style>

<div class="modal-body" style="background-color: #0b0e14; min-height: 100vh;">
    <form action="{{ url_for('cadastro_usuario') }}" method="post">
        <div class="d-flex justify-content-center align-items-center vh-100">

            <!-- Card com LED e Profundidade -->
            <div class="card p-4 shadow-sm" style="
                width: 350px;
                border-radius: 15px;
                background-color: #1a1d24;
                color: white;
                border: 2px solid #00d4ff;
                box-shadow: inset 0 0 10px #00d4ff, 0 0 20px #00d4ff, 0 0 40px #0077ff;">

                <h4 class="text-center mb-4" style="text-shadow: 0 0 12px #00d4ff; color: #00d4ff;">Criar Conta</h4>

                <div class="mb-3">
                    <label class="form-label w-100">
                        Nome:
                        <input type="text" name="nome" class="form-control bg-dark border-info input-neon" required placeholder="Seu nome completo">
                    </label>
                </div>

                <div class="mb-3">
                    <label class="form-label w-100">
                        Email:
                        <input type="email" name="email" class="form-control bg-dark border-info input-neon" required placeholder="exemplo@email.com">
                    </label>
                </div>

                <div class="mb-3">
                    <label class="form-label w-100">
                        Senha:
                        <input type="password" name="senha" class="form-control bg-dark border-info input-neon" required placeholder="Crie uma senha">
                    </label>
                </div>

                <button type="submit" class="btn btn-info w-100 mt-2 text-white fw-bold" style="box-shadow: 0 0 15px #00d4ff; background-color: #00d4ff; border: none;">
                    Cadastrar
                </button>

                <div class="text-center mt-3">
                    <a href="{{ url_for('login') }}" class="text-decoration-none small text-info" style="text-shadow: 0 0 5px #00d4ff;">
                        Já tem uma conta? Faça login
                    </a>
                </div>
            </div>
        </div>
    </form>
</div>
{% endblock %}
